<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARVICA SERVICES</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        .logo {
            max-width: 80%;
            height: auto;
            margin-bottom: 20px;
        }

        .company-name {
            font-size: 2rem;
            font-weight: bold;
            color: #003366;
            letter-spacing: 2px;
        }

        .tagline {
            font-size: 1.2rem;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Carga el logo que subiste -->
        <img src="DARVICA_logo" alt="DARVICA Logo" class="logo">
        <div class="company-name">DARVICA</div>
        <div class="tagline">SERVICES</div>
    </div>
</body>
</html>
