            margin: 20px;
        }
        h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        p {
            color: #666;
            font-size: 1.2rem;
            line-height: 1.5;
        }
        .footer {
            margin-top: 2rem;
            color: #999;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to DARVICA services</h1>
        <p>Your trusted partner for innovative solutions and professional services.</p>
        <p>We are committed to excellence and customer satisfaction.</p>
        <div class="footer">
            © 2026 DARVICA Services - All rights reserved
        </div>
